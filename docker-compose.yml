version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: job-postgres

    environment:
      POSTGRES_DB: job_executor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  controller-service:
    build:
      context: ./controller-service

    container_name: controller-service

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_executor
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root

  worker-1:
    build:
      context: ./worker-service

    container_name: worker-1

    ports:
      - "8081:8081"

    depends_on:
      - controller-service

  worker-2:
    build:
      context: ./worker-service

    container_name: worker-2

    ports:
      - "8082:8081"

    depends_on:
      - controller-service

  worker-3:
    build:
      context: ./worker-service

    container_name: worker-3

    ports:
      - "8083:8081"

    depends_on:
      - controller-service

volumes:
  postgres-data: